spring.application.name=proto-space

# テスト用DB（開発DBとは別。テストデータが開発DBを汚さない）
spring.datasource.url=jdbc:postgresql://localhost:5432/protospace_test
spring.datasource.username=protospace
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway（テストDBにもテーブルを作る）
spring.flyway.enabled=true

# MyBatis（snake_case → camelCase 変換）
mybatis.configuration.map-underscore-to-camel-case=true
